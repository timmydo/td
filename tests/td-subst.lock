# td-subst.lock — pinned inputs for building td-subst (subst/, td's substitute server)
# FROM SOURCE via td-builder build-recipe (buildSystem "rust"). td-subst has the SAME
# dependency closure as td-feed / td-fetch (ureq + rustls/ring + sha2; subst adds `ring`
