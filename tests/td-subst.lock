# subst/Cargo.lock pins td-feed's exact versions) — so this reuses td-fetch's toolchain
# seed + vendored .crate deps verbatim. The subst/ SOURCE tree is interned at gate time by
# td's OWN recursive addToStore (tests/intern-src.sh), keyed td-subst-source. Regenerate
# alongside tests/td-fetch.lock / tests/td-feed.lock on a channel/dep bump.
