# td-russh-demo.lock — the toolchain SEED for building the td-russh-demo crate (a russh
# client<->server SSH round-trip) via `td-builder build-recipe` (buildSystem "rust"). The
# rust/cargo/gcc-toolchain + coreutils/bash/tar/gzip lines are the shared Rust seed (retired
# last by source-bootstrap). The crypto backend (aws-lc-sys) has a C build script; run_rust
# sets CC/CXX + C_INCLUDE_PATH from gcc-toolchain/include (which already bundles the kernel
# headers aws-lc compiles against) — so NO extra seed is needed.
#
# Phase 2b: the 188-crate closure is NO LONGER pinned here as /gnu/store FODs. It is provisioned
# GUIX-FREE through td's cargo-proxy from the IN-TREE tests/russh-demo/Cargo.lock
# (td-feed warm crate-local tests/russh-demo russh — the source is local, so only the deps
# are fetched, each sha256 == the crates.io index cksum) and interned by the rust-russh gate (no
# guix build, no /gnu/store crate FOD, no oracle — content-address is the upstream pin). The
# td-russh-demo source is the live in-repo tree, interned at gate time (keyed td-russh-demo-source).
