# rust-upstream.lock — the pinned UPSTREAM Rust release tarball (rustc + cargo + std),
# the GUIX-FREE seed for td's /td/store Rust toolchain (rust-store-native track).
#
# These bytes come from the Rust project's own CDN (static.rust-lang.org), NOT from a
# guix build — so the tarball carries NO /gnu/store strings and NO guix provenance. The
# build recipe RELINKS this binary tarball to /td/store (interp + RUNPATH), eliminating
# guix at the source rather than relabeling it (this is NOT the demoted store-relocate of
# a guix binary).
#
# Unlike tests/td-tsgo.lock there is deliberately NO guix origin / oracle: the sha256
# content-address IS the oracle (the same model the crate-guix-free arc uses). The loop
# reads `path`; tools/warm-rust-upstream.sh is the HOST prep that td-fetches + verifies the
# bytes and daemon-adds them to the content-addressed `path` (the FETCHER is td-fetch; the
# daemon is only the store, retired last). The loop never fetches (offline).
#
# sha256 is the value published at <url>.sha256. Bump url + sha256 + path in lockstep.
