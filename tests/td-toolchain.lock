# tests/td-toolchain.lock — the MODERN /td/store toolchain's stable INPUT-ADDRESSED key
# (gcc-14.3.0 + binutils-2.44 + glibc-2.41), built from the 229-byte seed by gate
# bootstrap-glibc-241-store-native (mk/gates/412). It declares the COMPLETE pinned input
# set the toolchain build consumes — every source tarball + vendored boot patch in the
# bootstrap chain — so its key (sha256 over these, order-independent; `td-builder
# toolchain-key`) changes iff a declared input changes. The toolchain's store path is then
# INPUT-ADDRESSED (`td-builder toolchain-path .../td-toolchain.lock <component>`):
# /td/store/<key-digest>-<component>, a pure function of the inputs — so it is STABLE across
# the toolchain's non-byte-reproducible rebuilds (cc1 stamp, ar/install mtimes), where
# `store-add-recursive`'s content-addressed path VARIES build-to-build. That stable key is
# the prereq for td-subst chain-caching: a consumer computes the path from this lock and
# fetches it instead of the ~90-min rebuild.
#
# The `input`/`patch` pins MIRROR recipe-owned source pins + seed/patches/*; the
# toolchain-input-addressed gate asserts they stay in SYNC (a wrong pin is caught). Bump
# `recipe-rev` whenever the toolchain's build RECIPE changes without an input pin change
# (a build-script edit), so a recipe change still re-keys the toolchain.
name td-toolchain
recipe-rev 1
component binutils-2.44
component gcc-14.3.0
component glibc-2.41
