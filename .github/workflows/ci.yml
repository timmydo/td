# CI gate for PRs into main (DESIGN §7.2 landing protocol).
#
# CI runs the FAST gates only. The full, slow loop runs on the dev machine.
#
#   lint       — GitHub-hosted. Structural checks only (shell syntax, an
#                unparseable channel pin, tabs in Scheme): no Guix, no warm
#                store. Catches cheap breakage before anything heavier.
#
#   check-fast — GitHub-hosted. Imports the SMALL td-ci-fast store image (~4G:
#                the fast-tier closure only) and runs the UNMODIFIED offline
#                ./check.sh check-fast — the cheap derivation-level gates + the
#                tsc type-check (Makefile FAST_GATES). The real hermetic loop,
#                fast because the store is warm: import + lower + tsc in minutes,
#                no KVM, no 41G.
#
# The SLOW gates (the marionette/VM boots, the system/OCI image builds, the
# boa/td-builder --check rebuilds — everything in HEAVY_GATES not in FAST_GATES)
# run via the default `./check.sh` ON THE DEV MACHINE, not here. Cold CI cannot
# reliably rebuild the full closure: substitutes don't fully cover td's packages
# and upstream sources rot (a GNU mirror served a hash-mismatched hello tarball),
# so a from-scratch CI build of the 41G image is not dependable. Revisit moving
# the full gate into CI once we're off the Guix dependency and can solve the
# substitute/source-availability problem another way.
#
# Nothing here weakens the loop: the gate ladder still lives only in the
# Makefile, and `./check.sh` is unchanged and remains the authoritative gate —
# it just runs on the dev machine for the heavy gates rather than in CI.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One run per ref; a new push to the PR supersedes the old run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned (= v4): tag pins can move; this repo's posture is pinned inputs.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: shell syntax (check.sh, tests/*.sh, ci/*.sh, .github/*.sh)
        run: |
          set -eu
          bash -n check.sh
          for d in tests ci .github; do
            for f in "$d"/*.sh; do [ -e "$f" ] || continue; bash -n "$f"; done
          done
      - name: heal-revert primitive (ci/revert-suspect.sh)
        # The optimistic-merge heal primitive (an agent runs it on red main) is
        # git-driven, and the
        # loop sandbox has no git (like no diffutils/awk), so its DURABLE
        # behavioral test runs HERE — the hosted lint runner has git. It asserts
        # the revert reverses the suspect and the loop guard refuses to revert a
        # revert (DESIGN §7.2; tests/heal-revert.sh).
        run: bash tests/heal-revert.sh
      - name: channels.scm carries a parseable 40-hex pin
        # Same sed check.sh's integrity guard uses; an unparseable pin would
        # make every runner check fail with a confusing message, so fail it
        # here with a clear one.
        run: |
          set -eu
          pin=$(sed -n 's/.*(commit *"\([0-9a-f]\{40\}\)").*/\1/p' channels.scm | head -n1)
          test -n "$pin" || { echo "channels.scm: no parseable pinned commit" >&2; exit 1; }
          echo "pinned channel commit: $pin"
      - name: convention — no tabs in Scheme sources
        # CLAUDE.md repo conventions: hand-formatted 2-space indentation, no
        # tabs (and never `guix style`). This is td's OWN-Scheme convention;
        # vendored upstream sources under seed/ (e.g. the GNU Mes Scheme library
        # of the source-bootstrap, pinned byte-for-byte) are excluded — their
        # formatting is upstream's, and re-tabbing them would corrupt the pin.
        run: |
          set -eu
          if grep -rPl '\t' --include='*.scm' --exclude-dir=seed .; then
            echo "tab characters found in .scm files (convention: 2-space, no tabs)" >&2
            exit 1
          fi
          echo "no tabs in Scheme sources (vendored seed/ excluded)"

  check-fast:
    # Fast feedback gate: import the SMALL td-ci-fast store image and run the
    # UNMODIFIED offline ./check.sh check-fast (Makefile FAST_GATES = the cheap
    # derivation-level gates + ts). Same mechanism as the (now local-only) full
    # check, but a ~4G image (fast-tier closure: no qemu/marionette, no rust/boa,
    # no qcow2) and no KVM — imports in minutes and runs the real hermetic loop.
    #
    # Image: ghcr.io/<owner>/td-ci-fast:<pin>, with the bot-namespace image as
    # the current source (built on a dev box with ci/build-ci-image.sh
    # TD_TIER=fast; cold CI can't rebuild it reliably — see header). check.sh
    # guards `guix describe` == the pin, so a stale image fails loudly.
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # SHA-pinned (= v4): tag pins can move; this repo's posture is pinned inputs.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: free disk + move /gnu, /var/guix and /tmp to the big partition
        # The ~4G image + ~9.5G imported store live on /mnt's big partition, not
        # the ~14G root. No KVM/marionette here, so the full-image headroom the
        # local ./check.sh needs is not required.
        run: |
          set -eu
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
          sudo mkdir -p /mnt/gnu /mnt/var-guix /gnu /var/guix
          sudo install -d -m 1777 /mnt/tmp
          sudo mount --bind /mnt/gnu /gnu
          sudo mount --bind /mnt/var-guix /var/guix
          sudo mount --bind /mnt/tmp /tmp
          df -h / /mnt
      - name: install guix daemon + tools
        # The distro daemon only BOOTSTRAPS the import; the check runs the pinned
        # guix from the imported store. Ubuntu 23.10+ restricts unprivileged user
        # namespaces, which td's own loop sandbox (`td-builder host-sandbox`, the
        # sole loop container — check.sh runs check-fast inside it too) needs — lift
        # it. (The fix-the-host policy: the runner runs the unmodified td-sandbox
        # ./check.sh, no guix-shell-C fallback.)
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y guix skopeo jq
          if ! getent group guixbuild >/dev/null; then
            sudo groupadd --system guixbuild
            for i in $(seq -w 1 10); do
              sudo useradd -g guixbuild -G guixbuild -d /var/empty \
                -s /usr/sbin/nologin -c "Guix build user $i" \
                --system "guixbuilder$i"
            done
          fi
          sudo systemctl start guix-daemon
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: pull the fast-tier CI store image for this pin
        run: |
          set -eu
          pin=$(sed -n 's/.*(commit *"\([0-9a-f]\{40\}\)").*/\1/p' channels.scm | head -n1)
          test -n "$pin" || { echo "channels.scm: no parseable pinned commit" >&2; exit 1; }
          echo "pin: $pin"
          sudo install -d -o "$(id -un)" /mnt/td-ci-fast
          # Bot-namespace image (dev-box-built, public). The repo-namespace name
          # is tried first so a future pipeline-published image takes over with
          # no workflow change.
          for src in "ghcr.io/${{ github.repository_owner }}/td-ci-fast:$pin" \
                     "ghcr.io/timmydo-bot/td-ci-fast:$pin"; do
            if skopeo copy --insecure-policy "docker://$src" "oci:/mnt/td-ci-fast:$pin"; then
              echo "pulled $src"; exit 0
            fi
          done
          echo "no fast CI store image published for pin $pin (build with ci/build-ci-image.sh TD_TIER=fast)" >&2
          exit 1
      - name: import the store
        run: |
          set -eu
          ci/import-store.sh /mnt/td-ci-fast > /tmp/import.out
          tail -n1 /tmp/import.out > /tmp/channel-out
          echo "pinned profile: $(cat /tmp/channel-out)"
          sudo rm -rf /mnt/td-ci-fast
          df -h /mnt
      - name: switch the daemon to the imported pinned guix + host-guix shim
        # Run against the pinned daemon (avoids client/daemon protocol skew) and
        # put a dev-box-shaped guix on PATH — the imported profile's bin/guix is
        # a bare symlink that collapses check.sh's dirname-of-readlink guard.
        run: |
          set -eu
          channel_out=$(cat /tmp/channel-out)
          sudo systemctl stop guix-daemon
          sudo nohup "$channel_out/bin/guix-daemon" \
            --build-users-group=guixbuild >/tmp/daemon.log 2>&1 &
          for i in $(seq 1 50); do
            [ -S /var/guix/daemon-socket/socket ] && break; sleep 0.2
          done
          [ -S /var/guix/daemon-socket/socket ] \
            || { echo "pinned daemon never came up:" >&2; cat /tmp/daemon.log >&2; exit 1; }
          export PATH="$channel_out/bin:$PATH"
          CHANNEL_OUT="$channel_out" guix repl ci/host-guix-shim.scm > /tmp/shim.out
          host_guix=$(sed -n 's/^HOST_GUIX=//p' /tmp/shim.out)
          test -x "$host_guix/bin/guix" && test -x "$host_guix/bin/guix-daemon" \
            || { echo "host-guix shim came out malformed: '$host_guix'" >&2; exit 1; }
          echo "$host_guix" > /tmp/host-guix
      - name: run the fast tier (./check.sh check-fast, offline)
        run: |
          set -euo pipefail
          export PATH="$(cat /tmp/host-guix)/bin:$PATH"
          guix describe
          ./check.sh check-fast

  cargo-test:
    # The td-native build ENGINE gate — drv parse/emit, store-path hashing, NAR
    # framing, the SQLite store-db reader, ref-scan, and the userns sandbox helpers
    # (builder/src/*.rs #[test]s). This is the heart of td (the thing replacing guix),
    # yet it was in NO required CI check: `check-fast` runs the small td-ci-fast store
    # image, which carries NO rust toolchain (no rust/boa), so it cannot `cargo test`.
    # This job closes that gap WITHOUT growing the image: the builder crate is
    # dependency-free (builder/Cargo.toml has no [dependencies]), so the runner's
    # pre-installed Rust runs `cargo test --frozen` (= --locked --offline) with no
    # network, no guix, no store image — the same unit tests the dev-machine
    # `cargo-test`/`check-engine` gate runs, now gated on every PR. (Add to the
    # branch-protection required checks to make it blocking — see BRANCH-PROTECTION.md.)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned (= v4): tag pins can move; this repo's posture is pinned inputs.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: cargo test (td-builder engine unit tests — offline, no deps)
        run: |
          set -euo pipefail
          cargo test --frozen --manifest-path builder/Cargo.toml 2>&1 | tee /tmp/cargo-test.log
          grep -qE 'test result: ok\. [1-9][0-9]* passed' /tmp/cargo-test.log \
            || { echo "ERROR: cargo test reported no passing tests (vacuous run?)" >&2; exit 1; }
