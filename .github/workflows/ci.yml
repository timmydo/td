# CI gate for PRs into main (DESIGN §7.2 landing protocol).
#
# Two GitHub-hosted required checks, both host-native — no Guix, no store image:
#
#   lint       — Structural checks only: shell syntax (tests/ci/.github *.sh),
#                the heal-revert primitive, and the no-tabs-in-Scheme convention.
#                Catches cheap breakage before anything heavier.
#
#   cargo-test — The td-native build ENGINE gate: `cargo test --frozen` over the
#                dependency-free builder crate (drv parse/emit, store-path
#                hashing, NAR framing, the SQLite store-db reader, ref-scan, the
#                userns sandbox helpers). Offline, no deps, no guix, no store
#                image — the runner's pre-installed Rust runs it in ~seconds.
#
# The guix-built CI store image + the `check-fast` sandbox job were retired
# 2026-07-06 (github issue #415): the fast tier went empty when the guix gates
# were deleted (#409), so `check-fast` was a vacuous no-op importing a ~4G image;
# cargo-test is the real per-PR engine gate now. The heavy + daily tiers (the
# from-source bootstrap ladder, the corpus, the /td/store harness) run on the
# dev machine via `td-builder check` and nightly via ci/daily-full-suite.sh, not
# here — cold CI cannot reliably rebuild the full closure.
#
# Nothing here weakens the loop: the authoritative gate ladder is `td-builder
# check` (the gate runner), unchanged; CI is the cheap structural + engine
# backstop, and affected-checks is the dev-machine PR gate.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One run per ref; a new push to the PR supersedes the old run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned (= v4): tag pins can move; this repo's posture is pinned inputs.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: shell syntax (tests/*.sh, ci/*.sh, .github/*.sh)
        run: |
          set -eu
          for d in tests ci .github; do
            for f in "$d"/*.sh; do [ -e "$f" ] || continue; bash -n "$f"; done
          done
      - name: heal-revert primitive (ci/revert-suspect.sh)
        # The optimistic-merge heal primitive (an agent runs it on red main) is
        # git-driven, and the
        # loop sandbox has no git (like no diffutils/awk), so its DURABLE
        # behavioral test runs HERE — the hosted lint runner has git. It asserts
        # the revert reverses the suspect and the loop guard refuses to revert a
        # revert (DESIGN §7.2; tests/heal-revert.sh).
        run: bash tests/heal-revert.sh
      - name: convention — no tabs in Scheme sources
        # CLAUDE.md repo conventions: hand-formatted 2-space indentation, no
        # tabs (and never `guix style`). This is td's OWN-Scheme convention;
        # vendored upstream sources under seed/ (e.g. the GNU Mes Scheme library
        # of the source-bootstrap, pinned byte-for-byte) are excluded — their
        # formatting is upstream's, and re-tabbing them would corrupt the pin.
        run: |
          set -eu
          if grep -rPl '\t' --include='*.scm' --exclude-dir=seed .; then
            echo "tab characters found in .scm files (convention: 2-space, no tabs)" >&2
            exit 1
          fi
          echo "no tabs in Scheme sources (vendored seed/ excluded)"

  cargo-test:
    # The td-native build ENGINE gate — drv parse/emit, store-path hashing, NAR
    # framing, the SQLite store-db reader, ref-scan, and the userns sandbox helpers
    # (builder/src/*.rs #[test]s). This is the heart of td (the thing replacing guix)
    # and is now a REQUIRED per-PR check (it replaced the retired `check-fast` sandbox
    # job — github issue #415). No image: the builder crate is dependency-free
    # (builder/Cargo.toml has no [dependencies]), so the runner's pre-installed Rust
    # runs `cargo test --frozen` (= --locked --offline) with no network, no guix, no
    # store image — the same unit tests the dev-machine `cargo-test`/`check-engine`
    # gate runs. (Required-checks list: .github/setup-branch-protection.sh —
    # the maintainer applies it; see BRANCH-PROTECTION.md.)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned (= v4): tag pins can move; this repo's posture is pinned inputs.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: cargo test (td-builder engine unit tests — offline, no deps)
        run: |
          set -euo pipefail
          cargo test --frozen --manifest-path builder/Cargo.toml 2>&1 | tee /tmp/cargo-test.log
          grep -qE 'test result: ok\. [1-9][0-9]* passed' /tmp/cargo-test.log \
            || { echo "ERROR: cargo test reported no passing tests (vacuous run?)" >&2; exit 1; }

  check-fast:
    # TEMPORARY no-op. The guix store-image `check-fast` tier was retired (#415),
    # but branch protection still lists `check-fast` as a REQUIRED status context,
    # so a real merge is blocked until an admin re-runs
    # .github/setup-branch-protection.sh (which drops it, keeping lint + cargo-test).
    # This placeholder reports the required context green in the meantime — the real
    # per-PR engine gate is `cargo-test` above. DELETE this job once branch
    # protection no longer requires `check-fast`.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: check-fast retired — no-op placeholder (#415)
        run: echo "check-fast is retired (#415); the real per-PR gate is cargo-test. Re-apply .github/setup-branch-protection.sh to drop this required context, then delete this job."
