# CI gate for PRs into main (DESIGN §7.2 landing protocol).
#
# Two jobs, honest about what each can verify:
#
#   lint  — GitHub-hosted. Structural checks only: it has no Guix, no warm
#           /gnu/store, no pinned host daemon, so it CANNOT run the real loop.
#           It never replaces ./check.sh — it only catches cheap breakage
#           (shell syntax, an unparseable channel pin, convention drift)
#           before a human or the heavy runner spends time on the PR.
#
#   check — GitHub-hosted runner that imports the CI store image (the warm
#           build closure a dev box snapshots with ci/build-ci-image.sh) and
#           runs the canonical ./check.sh, the single pass/fail command.
#           check.sh itself guards that the guix on PATH matches the
#           channels.scm pin and refuses to run otherwise, so a stale image
#           fails loudly instead of silently going online (CLAUDE.md prime
#           directives 1–2). See .github/BRANCH-PROTECTION.md "CI store image".
#
# Nothing here weakens the loop: the rung ladder still lives only in the
# Makefile, and the merge gate is ./check.sh exactly as before — CI just runs
# it on a machine instead of trusting the agent ran it (DESIGN §4.3(2) is
# untouched; this is an added gate, and adding gates is always free).

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One run per ref; a new push to the PR supersedes the old run. Never more
# than one full check per runner anyway (a runner takes one job at a time),
# which respects the DESIGN §7.3 resource ceiling.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned (= v4): tag pins can move; this repo's posture is pinned inputs.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: shell syntax (check.sh, tests/*.sh)
        run: |
          set -eu
          bash -n check.sh
          for f in tests/*.sh; do [ -e "$f" ] || continue; bash -n "$f"; done
      - name: channels.scm carries a parseable 40-hex pin
        # Same sed check.sh's integrity guard uses; an unparseable pin would
        # make every runner check fail with a confusing message, so fail it
        # here with a clear one.
        run: |
          set -eu
          pin=$(sed -n 's/.*(commit *"\([0-9a-f]\{40\}\)").*/\1/p' channels.scm | head -n1)
          test -n "$pin" || { echo "channels.scm: no parseable pinned commit" >&2; exit 1; }
          echo "pinned channel commit: $pin"
      - name: convention — no tabs in Scheme sources
        # CLAUDE.md repo conventions: hand-formatted 2-space indentation, no
        # tabs (and never `guix style`).
        run: |
          set -eu
          if grep -rPl '\t' --include='*.scm' .; then
            echo "tab characters found in .scm files (convention: 2-space, no tabs)" >&2
            exit 1
          fi
          echo "no tabs in Scheme sources"

  check:
    # The real gate: the full hermetic, offline rung ladder on a GitHub-HOSTED
    # runner. The runner imports the CI store image — the warm build closure
    # snapshot a dev box pushed to ghcr.io/timmydo-bot/td-ci (ci/build-ci-image.sh)
    # — then runs the UNMODIFIED ./check.sh: same pinned guix (the image tag IS
    # the channels.scm pin, so a channel-bump PR stays red until the matching
    # image is pushed), same offline/no-substitutes loop, KVM for the
    # marionette rungs. Setup details: .github/BRANCH-PROTECTION.md
    # "CI store image".
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      # SHA-pinned (= v4): tag pins can move; this repo's posture is pinned inputs.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: free disk + move /gnu and /var/guix to the big partition
        # ubuntu-latest: ~14G free on /, ~75G on /mnt. The pulled blobs
        # (~21G) plus the imported store (~40G) both live on /mnt — and the
        # blobs are deleted right after the import. Preinstalled toolchains
        # are dropped for headroom on /.
        run: |
          set -eu
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
          sudo mkdir -p /mnt/gnu /mnt/var-guix /gnu /var/guix
          sudo mount --bind /mnt/gnu /gnu
          sudo mount --bind /mnt/var-guix /var/guix
          df -h / /mnt
      - name: install guix daemon + tools
        # The distro daemon only BOOTSTRAPS the import; the check itself runs
        # the pinned guix from the imported store. Ubuntu 23.10+ restricts
        # unprivileged user namespaces, which `guix shell -C` needs — lift it.
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y guix skopeo jq
          # Ubuntu's guix package does not create the standard build users;
          # the PINNED daemon (started later with --build-users-group=guixbuild)
          # needs them or the first build request fails. Upstream
          # binary-install recipe:
          if ! getent group guixbuild >/dev/null; then
            sudo groupadd --system guixbuild
            for i in $(seq -w 1 10); do
              sudo useradd -g guixbuild -G guixbuild -d /var/empty \
                -s /usr/sbin/nologin -c "Guix build user $i" \
                --system "guixbuilder$i"
            done
          fi
          sudo systemctl start guix-daemon
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sudo chmod 666 /dev/kvm || true
      - name: pull the CI store image for this pin
        run: |
          set -eu
          pin=$(sed -n 's/.*(commit *"\([0-9a-f]\{40\}\)").*/\1/p' channels.scm | head -n1)
          test -n "$pin" || { echo "channels.scm: no parseable pinned commit" >&2; exit 1; }
          echo "pin: $pin"
          # /mnt is root-owned on ubuntu-latest; skopeo runs as the runner user.
          sudo install -d -o "$(id -un)" /mnt/td-ci
          skopeo copy --insecure-policy \
            "docker://ghcr.io/timmydo-bot/td-ci:$pin" "oci:/mnt/td-ci:$pin"
      - name: import the store
        run: |
          set -eu
          # No pipeline: a pipe to tail would mask an import-store.sh failure.
          ci/import-store.sh /mnt/td-ci > /tmp/import.out
          tail -n1 /tmp/import.out > /tmp/channel-out
          echo "pinned profile: $(cat /tmp/channel-out)"
          # The blobs (~21G) + the imported store (~41G) nearly fill /mnt;
          # the layout is spent once imported, so reclaim it before the
          # check's own builds need room.
          sudo rm -rf /mnt/td-ci
          df -h /mnt
      - name: switch the daemon to the imported pinned guix
        # The distro daemon (2022-era) only bootstrapped the import; the loop
        # itself runs against the PINNED daemon, exactly like a dev box whose
        # system guix is the pin (avoids client/daemon protocol skew).
        run: |
          set -eu
          channel_out=$(cat /tmp/channel-out)
          sudo systemctl stop guix-daemon
          sudo nohup "$channel_out/bin/guix-daemon" \
            --build-users-group=guixbuild >/tmp/daemon.log 2>&1 &
          for i in $(seq 1 50); do
            [ -S /var/guix/daemon-socket/socket ] && break; sleep 0.2
          done
          [ -S /var/guix/daemon-socket/socket ] \
            || { echo "pinned daemon never came up:" >&2; cat /tmp/daemon.log >&2; exit 1; }
      - name: run the full check (./check.sh)
        run: |
          set -eu
          export PATH="$(cat /tmp/channel-out)/bin:$PATH"
          guix describe
          ./check.sh
