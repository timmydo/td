# td-sh — the brush-wrapped seed shell (sh/, re #469). It carries crates
# (brush + its lock-pinned tree), so the offline cargo-test gate cannot build
# it; this workflow is its hosted build + lint + script-compat coverage.
#
# Its own workflow, paths-filtered to sh/**: the job cold-builds the whole
# brush closure, and burning that on every unrelated PR bought nothing
# (subagent review finding). Safe precisely because the check is NOT required —
# a paths-filtered required context would wedge non-sh PRs as forever-pending.
# It becomes required (and unconditional) with the bootstrap rung cutover.
#
# The dev-machine mirror of this coverage is the affected-checks `td-sh-test`
# preflight (clippy + cargo test over sh/), which blocks the local loop
# whenever sh/* changes.

name: td-sh

on:
  pull_request:
    branches: [main]
    paths: ['sh/**', '.github/workflows/td-sh.yml']
  push:
    branches: [main]
    paths: ['sh/**', '.github/workflows/td-sh.yml']

# One run per ref; a new push to the PR supersedes the old run.
concurrency:
  group: td-sh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  td-sh-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # SHA-pinned (= v4): tag pins can move; this repo's posture is pinned inputs.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # sh/ pins rust-version 1.88 and brush's tree is edition-2024 — do not
      # depend on the runner image's preinstalled Rust staying new enough.
      - name: rustup — ensure the sh/ MSRV floor
        run: rustup update stable && rustup default stable
      # cargo test alone ignores the [lints] denies; clippy enforces them.
      - name: clippy (sh/Cargo.toml lints — no panic surface)
        run: cargo clippy --locked --all-targets --manifest-path sh/Cargo.toml
      - name: cargo test (td-sh script-compat tests — lock-pinned crates)
        run: |
          set -euo pipefail
          cargo test --locked --manifest-path sh/Cargo.toml 2>&1 | tee /tmp/td-sh-test.log
          grep -qE 'test result: ok\. [1-9][0-9]* passed' /tmp/td-sh-test.log \
            || { echo "ERROR: td-sh cargo test reported no passing tests (vacuous run?)" >&2; exit 1; }
